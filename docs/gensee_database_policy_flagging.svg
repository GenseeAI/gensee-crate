<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
</marker>
<style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#111827}.small{font-size:20px;fill:#374151}.tiny{font-size:16px;fill:#4b5563}.boxtext{font-size:20px}.title{font-size:34px;font-weight:700}.note{font-size:21px;fill:#374151}</style>
</defs>
<rect width="1600" height="900" fill="white"/>
<text class="title" x="48" y="62">How Things Get Flagged: Versioned Policy Engine</text>
<rect x="70" y="115" width="305" height="130" rx="14" fill="#ede9fe" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="222.5" y="138.0" font-weight="700">default-policy.json</text>
<text class="boxtext" text-anchor="middle" x="222.5" y="166.0">versioned rules as data</text>
<text class="boxtext" text-anchor="middle" x="222.5" y="194.0">GENSEE_POLICY_FILE</text>
<text class="boxtext" text-anchor="middle" x="222.5" y="222.0">override</text>
<rect x="70" y="285" width="305" height="110" rx="14" fill="#ede9fe" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="222.5" y="312.0" font-weight="700">Runtime allowlist</text>
<text class="boxtext" text-anchor="middle" x="222.5" y="340.0">GENSEE_POLICY_ALLOW</text>
<text class="boxtext" text-anchor="middle" x="222.5" y="368.0">_PATH_PREFIXES</text>
<rect x="70" y="455" width="280" height="125" rx="14" fill="#dbeafe" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="210.0" y="489.5" font-weight="700">Active input</text>
<text class="boxtext" text-anchor="middle" x="210.0" y="517.5">PreToolUse hook</text>
<text class="boxtext" text-anchor="middle" x="210.0" y="545.5">Bash/native tool payload</text>
<rect x="70" y="645" width="280" height="125" rx="14" fill="#dbeafe" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="210.0" y="679.5" font-weight="700">Passive input</text>
<text class="boxtext" text-anchor="middle" x="210.0" y="707.5">file intents, workspace effects</text>
<text class="boxtext" text-anchor="middle" x="210.0" y="735.5">system events</text>
<rect x="485" y="155" width="260" height="115" rx="14" fill="#ede9fe" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="615.0" y="184.5" font-weight="700">Policy::global()</text>
<text class="boxtext" text-anchor="middle" x="615.0" y="212.5">load once</text>
<text class="boxtext" text-anchor="middle" x="615.0" y="240.5">embedded or override</text>
<rect x="485" y="430" width="260" height="130" rx="14" fill="#dbeafe" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="615.0" y="467.0" font-weight="700">Subject extraction</text>
<text class="boxtext" text-anchor="middle" x="615.0" y="495.0">operation + path</text>
<text class="boxtext" text-anchor="middle" x="615.0" y="523.0">raw payload text</text>
<rect x="820" y="320" width="285" height="140" rx="14" fill="#fef9c3" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="962.5" y="362.0" font-weight="700">Policy evaluator</text>
<text class="boxtext" text-anchor="middle" x="962.5" y="390.0">single source of truth</text>
<text class="boxtext" text-anchor="middle" x="962.5" y="418.0">CLI + store both call this</text>
<rect x="805" y="105" width="285" height="135" rx="14" fill="#fef9c3" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="947.5" y="130.5" font-weight="700">Path rules</text>
<text class="boxtext" text-anchor="middle" x="947.5" y="158.5">protected secrets</text>
<text class="boxtext" text-anchor="middle" x="947.5" y="186.5">credential hints</text>
<text class="boxtext" text-anchor="middle" x="947.5" y="214.5">persistence writes</text>
<rect x="805" y="515" width="285" height="135" rx="14" fill="#fef9c3" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="947.5" y="540.5" font-weight="700">Operation rules</text>
<text class="boxtext" text-anchor="middle" x="947.5" y="568.5">destructive</text>
<text class="boxtext" text-anchor="middle" x="947.5" y="596.5">outside workspace</text>
<text class="boxtext" text-anchor="middle" x="947.5" y="624.5">metadata, wildcard</text>
<rect x="805" y="700" width="285" height="115" rx="14" fill="#fef9c3" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="947.5" y="729.5" font-weight="700">URL rules</text>
<text class="boxtext" text-anchor="middle" x="947.5" y="757.5">cloud metadata endpoints</text>
<text class="boxtext" text-anchor="middle" x="947.5" y="785.5">scan tool payload text</text>
<rect x="1210" y="170" width="300" height="145" rx="14" fill="#fecaca" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="1360.0" y="200.5" font-weight="700">BLOCK / deny</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="228.5">protected secret</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="256.5">outside workspace</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="284.5">metadata URL</text>
<rect x="1210" y="395" width="300" height="145" rx="14" fill="#fed7aa" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="1360.0" y="425.5" font-weight="700">ASK</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="453.5">credential hint</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="481.5">persistence write</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="509.5">metadata / wildcard</text>
<rect x="1210" y="620" width="300" height="110" rx="14" fill="#dcfce7" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="1360.0" y="647.0" font-weight="700">ALLOW</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="675.0">no findings</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="703.0">sampler may start</text>
<rect x="1210" y="760" width="300" height="105" rx="14" fill="#e0f2fe" stroke="#203040" stroke-width="2"/>
<text class="boxtext" text-anchor="middle" x="1360.0" y="784.5" font-weight="700">alerts table</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="812.5">request_id + entity ref</text>
<text class="boxtext" text-anchor="middle" x="1360.0" y="840.5">rule_id + evidence</text>
<text class="note" x="70" y="78">Rules moved from hardcoded CLI/store predicates into a versioned policy document. Strongest action wins: block &gt; ask &gt; allow.</text>
<path d="M375.0,180.0 L485.0,212.5" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="395.0" y="176.2" width="70" height="28" rx="8" fill="white" opacity="0.9"/>
<text class="tiny" text-anchor="middle" x="430.0" y="196.2" fill="#374151">parse</text>
