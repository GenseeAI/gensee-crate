<path d="M350.0,517.5 L485.0,495.0" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M350.0,707.5 L485.0,495.0" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M615.0,270.0 L962.5,320.0" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M745.0,495.0 L820.0,390.0" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M947.5,240.0 L962.5,320.0" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M947.5,515.0 L962.5,460.0" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M947.5,700.0 L962.5,460.0" fill="none" stroke="#374151" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M1105.0,390.0 L1210.0,242.5" fill="none" stroke="#dc2626" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M1105.0,390.0 L1210.0,467.5" fill="none" stroke="#ea580c" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M1105.0,390.0 L1210.0,675.0" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M1510.0,242.5 Q1510.0,737.5 1510.0,812.5" fill="none" stroke="#dc2626" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M1510.0,467.5 Q1510.0,775.0 1510.0,812.5" fill="none" stroke="#ea580c" stroke-width="2.4" marker-end="url(#arrow)"/>
<text class="small" x="70" y="860">Active PreToolUse findings become agent allow/ask/deny decisions. Passive observations emit recommendation alerts only.</text>
</svg>
